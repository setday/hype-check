# Full W1: all models × all datasets, 150 Optuna trials, W&B + SQLite resume
defaults:
  - _self_

global_settings:
  seed: 42

device: cuda

gpu:
  use_amp: true
  pin_memory: true
  num_workers: 2

datasets:
  - hillstrom_mens
  - hillstrom_womens
  - x5
  - criteo
  - lzd

dataset_configs:
  hillstrom_mens:
    cohort_limit: null
    cohort_seed: 20260715
  hillstrom_womens:
    cohort_limit: null
    cohort_seed: 20260715
  x5:
    cohort_limit: null
    cohort_seed: 20260715
  criteo:
    cohort_limit: 300000
    cohort_seed: 20260715
  lzd:
    cohort_limit: null
    cohort_seed: 20260715

models:
  - dragonnet
  - tarnet
  - cfrnet
  - efin
  - descn

split:
  test_size: 0.2
  split_seed: 20260716
  n_splits: 3
  cv_seed: 42

optuna:
  n_trials: 150
  sampler_seed: 42
  n_jobs: 1
  storage: sqlite:///${hydra:runtime.cwd}/results/neural_tune_gpu_full/optuna.db

bootstrap:
  n_replicates: 1000
  seed: 42
  quantiles: [0.025, 0.975]

wandb:
  enabled: true
  project: hype-check
  entity: hype-check
  run_name: neural-w1-gpu-150t-all-models

outdir: ${hydra:runtime.cwd}/results/neural_tune_gpu_full
