# Smoke test on GPU: 1 dataset, 1 model, 2 Optuna trials
defaults:
  - _self_

global_settings:
  seed: 42

device: cuda

datasets:
  - hillstrom_mens

dataset_configs:
  hillstrom_mens:
    cohort_limit: null
    cohort_seed: 20260715
  hillstrom_womens:
    cohort_limit: null
    cohort_seed: 20260715
  x5:
    cohort_limit: null
    cohort_seed: 20260715
  criteo:
    cohort_limit: 300000
    cohort_seed: 20260715
  lzd:
    cohort_limit: null
    cohort_seed: 20260715

models:
  - dragonnet

split:
  test_size: 0.2
  split_seed: 20260716
  n_splits: 3
  cv_seed: 42

optuna:
  n_trials: 2
  sampler_seed: 42
  n_jobs: 1
  storage: null

bootstrap:
  n_replicates: 10
  seed: 42
  quantiles: [0.025, 0.975]

wandb:
  enabled: false
  project: hype-check
  entity: hype-check
  run_name: smoke-gpu-jupyter

outdir: ${hydra:runtime.cwd}/results/neural_tune_gpu_smoke
